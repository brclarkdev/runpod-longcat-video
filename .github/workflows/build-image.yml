name: Build LongCat service image

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - app/**
      - docker/**
      - scripts/**
      - .github/workflows/build-image.yml
      - .dockerignore

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 360
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set image metadata
        id: meta
        run: |
          IMAGE="ghcr.io/${GITHUB_REPOSITORY,,}"
          echo "image=$IMAGE" >> "$GITHUB_OUTPUT"
          echo "sha_tag=$IMAGE:${GITHUB_SHA::12}" >> "$GITHUB_OUTPUT"
          echo "latest_tag=$IMAGE:latest" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          platforms: linux/amd64
          push: true
          tags: |
            ${{ steps.meta.outputs.sha_tag }}
            ${{ steps.meta.outputs.latest_tag }}
          provenance: false
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Summary
        run: |
          echo "Built image:" >> "$GITHUB_STEP_SUMMARY"
          echo "- ${{ steps.meta.outputs.sha_tag }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- ${{ steps.meta.outputs.latest_tag }}" >> "$GITHUB_STEP_SUMMARY"
